app = 'sarzal'
primary_region = 'ams'

[build]

# Aucun [http_service] ni [[services]] = worker pur, pas de port exposé
# La commande de démarrage est définie dans le Dockerfile (CMD ["sh", "start.sh"])

[processes]
  app = "sh start.sh"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'  # 256 était trop juste pour lancer Chromium (réservation)
