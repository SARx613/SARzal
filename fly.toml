app = 'sarzal'
primary_region = 'ams'

[build]

# Aucun [http_service] ni [[services]] = worker pur, pas de port exposé
# La commande de démarrage est définie dans le Dockerfile (CMD ["sh", "start.sh"])

[processes]
  app = "sh start.sh"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'  # 512 était encore trop juste : dmesg montrait Chromium
  # refuser une allocation de 512MB d'un coup (__vm_enough_memory), ce qui
  # bloquait silencieusement le network service interne (page.goto() qui ne
  # résout jamais, sans erreur). 256→512 ne suffisait qu'à lancer Chromium,
  # pas à le faire NAVIGUER en même temps que le monitoring tourne.
